<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - LoginSuite</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    background:#03081a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.login-box{
    width:420px;
    max-width:92%;
    background:#111827;
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:40px;
}

.login-logo{
    text-align:center;
    margin-bottom:25px;
}

.login-logo h1{
    margin:15px 0 5px;
}

.login-logo p{
    color:#8b93a8;
}

.google-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#fff;
    color:#111;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:20px;
}

.or{
    text-align:center;
    color:#8b93a8;
    margin:20px 0;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
}

.input-group input{
    width:100%;
    padding:15px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.08);
    background:#1b2436;
    color:white;
    box-sizing:border-box;
}

.forgot{
    display:block;
    text-align:right;
    color:#6d63ff;
    margin:12px 0 25px;
    text-decoration:none;
}

.login-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#5d5cff,#7c4dff);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

.signup{
    margin-top:25px;
    text-align:center;
    color:#8b93a8;
}

.signup a{
    color:#6d63ff;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="login-box">

<div class="login-logo">
<div class="logo-circle">L</div>
<h1>Welcome Back</h1>
<p>Login to your LoginSuite account</p>
</div>
<button class="google-btn">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
alt="Google"
class="google-icon">

<span>Continue with Google</span>

</button>

<div class="or">
──────── OR ────────
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" placeholder="Enter your email">
</div>

<div class="input-group">
<label>Password</label>

<div class="password-box">
    <input type="password" id="password" placeholder="Enter your password">

    <span id="togglePassword">👁</span>
</div>

</div>

<a href="forgot-password.html" class="forgot">
Forgot Password?
</a>

<button class="login-btn">
Login
</button>

<div class="signup">
Don't have an account?
<a href="signup.html">Create Account</a>
</div>

</div>
<script>
const password = document.getElementById("password");
const toggle = document.getElementById("togglePassword");

toggle.onclick = function(){

    if(password.type === "password"){
        password.type = "text";
        toggle.innerHTML = "🙈";
    }else{
        password.type = "password";
        toggle.innerHTML = "👁";
    }

};
</script>
<div id="loader">
    <div class="loader-circle"></div>
</div>

<script>
function loading(nextPage){

    document.getElementById("loader").style.display="flex";

    setTimeout(function(){

        window.location.href=nextPage;

    },1500);

}
</script>

</body>
</html>
