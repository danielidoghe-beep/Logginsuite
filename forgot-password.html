<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link rel="stylesheet" href="style.css">

<style>
body{
background:#03081a;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.box{
width:420px;
max-width:92%;
background:#111827;
padding:40px;
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
}

.box h1{
text-align:center;
margin-bottom:10px;
}

.box p{
text-align:center;
color:#8b93a8;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
background:#1b2436;
border:none;
border-radius:14px;
color:white;
margin-bottom:20px;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
background:linear-gradient(135deg,#5d5cff,#7c4dff);
color:white;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.back{
margin-top:25px;
text-align:center;
}

.back a{
color:#6d63ff;
text-decoration:none;
}
</style>

</head>

<body>

<div class="box">

<h1>Forgot Password</h1>

<p>
Enter your email address to receive a verification code.
</p>

<input type="email" placeholder="Email Address">

<button>
Send Verification Code
</button>

<div class="back">
<a href="login.html">Back to Login</a>
</div>

</div>

</body>
</html>
