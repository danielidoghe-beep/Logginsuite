<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LoginSuite</title>

    <link rel="stylesheet" href="dashboard.css">
</head>

<body>

<header class="dashboard-header">

    <div class="logo">
        <div class="logo-circle">L</div>
        <span>LoginSuite</span>
    </div>

    <button class="menu-btn">☰</button>

</header>

<main id="dashboardContent">

    <!-- Welcome -->
    <div class="welcome">
        Welcome back
    </div>

    <!-- Wallet Card -->
    <section class="wallet-card">

        <div class="wallet-top">

            <span>Available Balance</span>

            <button class="add-funds">
                + Add Funds
            </button>

        </div>

        <h1>₦0.00</h1>

        <p>Your current wallet balance</p>

    </section>

    <!-- Stats -->
    <div class="stats">

        <div class="stat-box">
            <h3>₦0.00</h3>
            <p>Total Spent</p>
        </div>

        <div class="stat-box">
            <h3>0</h3>
            <p>Total Orders</p>
        </div>

    </div>

    <!-- Blue Banner -->
    <section class="promo-card">

        <div class="promo-text">

            <h2>Rent Virtual Numbers</h2>

            <p>
                Instantly receive SMS online with secure temporary numbers.
            </p>

            <button class="promo-btn">
                Get Started →
            </button>

        </div>

        <div class="promo-icon">
            📱
        </div>

    </section>
<section class="social-card">

    <div class="social-header">
        <h2>👥 Social Accounts</h2>

        <div class="dots">
            <span class="active"></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="count">
        <h1>0</h1>
        <span>purchased</span>
    </div>

    <div class="status-boxes">

        <div class="status">
            <p>🟡 Pending</p>
            <h3>0</h3>
        </div>

        <div class="status">
            <p>🟢 Completed</p>
            <h3>0</h3>
        </div>

    </div>

    <button class="browse-btn">
        Browse Accounts →
    </button>

</section>

</main>
<a href="https://t.me/child_of_christ_A"
class="telegram-float"
target="_blank">

</svg>

</a>
</body>
</html>
