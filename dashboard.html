<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LoginSuite</title>

    <link rel="stylesheet" href="dashboard.css">
</head>

<body>

<header class="dashboard-header">

    <div class="logo">
        <div class="logo-circle">L</div>
        <span>LoginSuite</span>
    </div>

    <button class="menu-btn">☰</button>

</header>

<div class="welcome">
    Welcome back
</div>
<section class="wallet-card">

    <div class="wallet-top">
        <span>Available Balance</span>
        <button class="add-funds">+ Add Funds</button>
    </div>

    <h1>₦0.00</h1>

    <p>Your current wallet balance</p>

</section>

<div class="stats">

    <div class="stat-box">
        <h3>₦0.00</h3>
        <p>Total Spent</p>
    </div>

    <div class="stat-box">
        <h3>0</h3>
        <p>Total Orders</p>
    </div>
<section class="promo-card">

    <div class="promo-text">
        <h2>Rent Virtual Numbers</h2>

        <p>
            Instantly receive SMS online with secure temporary numbers.
        </p>

        <button class="promo-btn">
            Get Started →
        </button>
    </div>

    <div class="promo-icon">
        📱
    </div>

</section>
</div>
</body>
</html>
