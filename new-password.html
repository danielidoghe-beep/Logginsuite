<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create New Password</title>
<link rel="stylesheet" href="style.css">

<style>

body{
background:#03081a;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
font-family:Arial,sans-serif;
}

.box{
width:420px;
max-width:92%;
background:#111827;
padding:40px;
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
}

.box h1{
text-align:center;
color:white;
margin-bottom:10px;
}

.box p{
text-align:center;
color:#8b93a8;
margin-bottom:30px;
}

input{
width:100%;
padding:16px;
margin-bottom:20px;
background:#1b2436;
border:none;
border-radius:14px;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#5d5cff,#7c4dff);
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h1>Create New Password</h1>

<p>
Your new password must be different from your previous password.
</p>

<input type="password" placeholder="New Password">

<input type="password" placeholder="Confirm Password">

<button onclick="window.location.href='login.html'">

Save Password

</button>

</div>
<div id="loader">
    <div class="loader-circle"></div>
</div>
</body>

</html>
